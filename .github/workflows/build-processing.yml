name: Build Processing

on:
   push:
      paths:
         - "packages/processing/**"
   pull_request:
      paths:
         - "packages/processing/**"
   workflow_dispatch:

jobs:
   build-processing:
      runs-on: windows-latest
      permissions:
         contents: write
      
      steps:
         -  name: Checkout repository
            uses: actions/checkout@v6
         
         -  name: Setup Bun
            uses: oven-sh/setup-bun@v2
         
         -  name: Install dependencies
            run: bun install
         
         -  name: Build processing executable
            run: bun run --cwd packages/processing build
         
         -  name: Upload processing executable
            uses: actions/upload-artifact@v7
            with:
               name: processing-exe
               path: packages/processing/dist/processing.exe
         
         -  name: Create or update release
            if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
            uses: ncipollo/release-action@v1
            with:
               tag: processing-${{ github.sha }}
               name: Processing ${{ github.sha }}
               artifacts: packages/processing/dist/processing.exe
               allowUpdates: true
               artifactErrorsFailBuild: true
